workflows:
  build-apk:
    name: Build DeepSe APK
    max_build_duration: 20
    instance_type: linux
    environment:
      vars:
        PYTHON_VERSION: "3.9.13"
      groups:
        - credentials
    scripts:
      - name: Install Python and dependencies
        script: |
          # Установка Python через pyenv
          pyenv install $PYTHON_VERSION -s
          pyenv global $PYTHON_VERSION
          
          # Установка пакетов
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install python-for-android
          
      - name: Setup Android SDK
        script: |
          # Создаём структуру SDK
          mkdir -p $HOME/android-sdk
          cd $HOME
          
          # Качаем tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          rm -f commandlinetools-linux-11076708_latest.zip
          
          # Правильная структура
          mkdir -p $HOME/android-sdk/cmdline-tools
          mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          
          # Переменные
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          
          # Установка SDK
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" \
                     "platforms;android-33" \
                     "build-tools;33.0.0" \
                     "ndk;25.2.9519653"
          
          # Сохраняем переменные
          echo "export ANDROID_HOME=$ANDROID_HOME" >> $CM_ENV
          echo "export ANDROIDNDK=$ANDROID_HOME/ndk/25.2.9519653" >> $CM_ENV
          
      - name: Check main.py
        script: |
          if [ ! -f "main.py" ]; then
            echo "⚠️ main.py не найден! Создаю тестовый..."
            cat > main.py << 'EOF'
from kivy.app import App
from kivy.uix.label import Label

class DeepSeApp(App):
    def build(self):
        return Label(text='DeepSe VPN')

if __name__ == '__main__':
    DeepSeApp().run()
EOF
          fi
          
      - name: Create requirements
        script: |
          cat > requirements.txt << EOF
          kivy==2.3.0
          requests==2.31.0
          EOF
          
      - name: Build APK
        script: |
          # Загружаем переменные
          source $CM_ENV
          
          # Очистка кеша
          rm -rf ~/.local/share/python-for-android
          
          # Сборка
          p4a apk --private . \
            --package=com.deepse.vpn \
            --name "DeepSe VPN" \
            --version 0.1 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy==2.3.0,requests==2.31.0 \
            --permission INTERNET \
            --arch=arm64-v8a \
            --arch=armeabi-v7a \
            --sdk_dir=$ANDROID_HOME \
            --ndk_dir=$ANDROIDNDK \
            --android_api=33 \
            --minsdk=21 \
            --target-sdk=33 \
            --release \
            --ignore-setup-py
    artifacts:
      - bin/*.apk
    publishing:
      email:
        recipients:
          - your@email.com
