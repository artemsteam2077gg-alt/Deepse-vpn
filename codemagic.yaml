workflows:
  build-apk:
    name: Build DeepSe APK
    instance_type: linux
    max_build_duration: 20
    environment:
      python: 3.9.13
      groups:
        - credentials
    scripts:
      - name: Install dependencies
        script: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install python-for-android
          
      - name: Setup Android SDK
        script: |
          mkdir -p $HOME/android-sdk
          cd $HOME
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          rm -f commandlinetools-linux-11076708_latest.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0" "ndk;25.2.9519653"
          
      - name: Build APK
        script: |
          export ANDROIDNDK=$ANDROID_HOME/ndk/25.2.9519653
          export ANDROIDSDK=$ANDROID_HOME
          p4a apk --private . \
            --package=com.deepse.vpn \
            --name "DeepSe VPN" \
            --version 0.1 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy==2.3.0,requests==2.31.0 \
            --permission INTERNET \
            --arch=arm64-v8a \
            --sdk_dir=$ANDROIDSDK \
            --ndk_dir=$ANDROIDNDK \
            --android_api=33 \
            --minsdk=21 \
            --target-sdk=33 \
            --release \
            --ignore-setup-py
    artifacts:
      - bin/*.apk
