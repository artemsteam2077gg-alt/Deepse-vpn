workflows:
  deepse-vpn-build:
    name: DeepSe VPN APK Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        PYTHON_VERSION: "3.9.13"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install OpenSSL 3 и зависимости
        script: |
          # Устанавливаем OpenSSL 3 (современная версия)
          brew install --quiet openssl@3 || true
          brew link --overwrite openssl@3 || true
          
          # Создаём симлинк, чтобы p4a думал что это openssl@1.1
          mkdir -p /opt/homebrew/opt/openssl@1.1
          ln -s /opt/homebrew/opt/openssl@3 /opt/homebrew/opt/openssl@1.1 || true
          
          # Устанавливаем остальные зависимости
          brew install --quiet automake libtool pkg-config cmake || true
          
          # Устанавливаем Python зависимости
          pip3 install --upgrade pip setuptools wheel
          pip3 install cython==0.29.36
          pip3 install python-for-android==2024.1.21
          
      - name: Check main.py
        script: |
          if [ ! -f "main.py" ]; then
            echo "❌ main.py не найден!"
            exit 1
          else
            echo "✅ main.py найден"
          fi
          
      - name: Build APK
        script: |
          # Указываем p4a использовать OpenSSL 3
          export PKG_CONFIG_PATH="/opt/homebrew/opt/openssl@3/lib/pkgconfig:$PKG_CONFIG_PATH"
          export LDFLAGS="-L/opt/homebrew/opt/openssl@3/lib"
          export CPPFLAGS="-I/opt/homebrew/opt/openssl@3/include"
          
          # Автоматический ответ "y" на все вопросы
          yes "y" | p4a apk --private . \
            --package=com.deepse.vpn \
            --name "DeepSe VPN" \
            --version 0.1 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy==2.3.0,requests==2.31.0 \
            --permission INTERNET \
            --arch=arm64-v8a \
            --release \
            --ignore-setup-py \
            --sdk-dir $ANDROID_HOME \
            --ndk-dir $ANDROID_NDK_HOME
          
      - name: Verify APK
        script: |
          if [ -d "bin" ] && [ "$(ls -A bin/*.apk 2>/dev/null)" ]; then
            echo "✅ APK создан успешно!"
            ls -la bin/
          else
            echo "❌ APK не создан"
            exit 1
          fi
          
    artifacts:
      - bin/*.apk
      
    publishing:
      email:
        recipients:
          - artemsteam2077gg@gmail.com
        notify:
          success: true
          failure: true
