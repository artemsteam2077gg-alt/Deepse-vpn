workflows:
  buildozer-build:
    name: DeepSe VPN APK
    max_build_duration: 45
    instance_type: linux
    environment:
      vars:
        PYTHON_VERSION: "3.11.0"
    scripts:
      - name: Install system dependencies
        script: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            wget \
            unzip \
            python3-pip \
            python3-dev \
            python3-venv \
            openjdk-17-jdk \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libltdl-dev \
            libffi-dev \
            libssl-dev \
            autoconf \
            libtool \
            pkg-config \
            cmake \
            ninja-build
            
      - name: Install Buildozer
        script: |
          pip3 install --upgrade pip
          pip3 install buildozer cython virtualenv
          
      - name: Check files
        script: |
          echo "📁 Содержимое папки:"
          ls -la
          
          if [ ! -f "main.py" ]; then
            echo "❌ main.py не найден!"
            exit 1
          fi
          
          if [ ! -f "buildozer.spec" ]; then
            echo "⚠️ buildozer.spec не найден, создаю..."
            cat > buildozer.spec << 'EOF'
[app]
title = DeepSe VPN
package.name = deepse
package.domain = com.deepse.vpn
source.dir = .
source.include_exts = py,png,jpg,kv,atlas,txt
version = 0.1
requirements = python3,kivy==2.3.0,requests==2.31.0
orientation = portrait
osx.python_version = 3
osx.kivy_version = 2.3.0
fullscreen = 0

[buildozer]
log_level = 2
warn_on_root = 1
EOF
          fi
          
      - name: Build APK
        script: |
          yes | buildozer android debug
          
      - name: Verify APK
        script: |
          APK_FILE=$(ls bin/*.apk 2>/dev/null | head -1)
          if [ -f "$APK_FILE" ]; then
            echo "✅ APK создан: $APK_FILE"
            ls -la bin/
          else
            echo "❌ APK не найден!"
            exit 1
          fi
          
    artifacts:
      - bin/*.apk
