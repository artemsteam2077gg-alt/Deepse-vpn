workflows:
  deepse-build:
    name: DeepSe VPN
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        PYTHON_VERSION: "3.9.13"
    scripts:
      - name: Fix OpenSSL
        script: |
          # Устанавливаем OpenSSL 3
          brew install openssl@3
          
          # Получаем путь к OpenSSL 3
          OPENSSL_PATH=$(brew --prefix openssl@3)
          echo "OpenSSL path: $OPENSSL_PATH"
          
          # Устанавливаем переменные окружения
          export PKG_CONFIG_PATH="$OPENSSL_PATH/lib/pkgconfig:$PKG_CONFIG_PATH"
          export LDFLAGS="-L$OPENSSL_PATH/lib"
          export CPPFLAGS="-I$OPENSSL_PATH/include"
          
          # Сохраняем в глобальные переменные
          echo "export PKG_CONFIG_PATH=$OPENSSL_PATH/lib/pkgconfig" >> $CM_ENV
          echo "export LDFLAGS=-L$OPENSSL_PATH/lib" >> $CM_ENV
          echo "export CPPFLAGS=-I$OPENSSL_PATH/include" >> $CM_ENV
          
          # Устанавливаем остальное
          brew install automake libtool pkg-config cmake
          
          # Python пакеты
          pip3 install --upgrade pip
          pip3 install cython==0.29.36
          pip3 install python-for-android==2024.1.21
          
      - name: Check main.py
        script: |
          if [ ! -f "main.py" ]; then
            echo "❌ main.py не найден!"
            exit 1
          fi
          
      - name: Build
        script: |
          # Загружаем переменные окружения
          source $CM_ENV
          
          # Создаём пустой файл openssl.pc если его нет
          OPENSSL_PATH=$(brew --prefix openssl@3)
          mkdir -p $OPENSSL_PATH/lib/pkgconfig
          
          # Запускаем сборку
          yes | p4a apk --private . \
            --package=com.deepse.vpn \
            --name "DeepSe VPN" \
            --version 0.1 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy,requests \
            --permission INTERNET \
            --arch=arm64-v8a \
            --release \
            --ignore-setup-py \
            --sdk-dir $ANDROID_HOME \
            --ndk-dir $ANDROID_NDK_HOME
          
    artifacts:
      - bin/*.apk
