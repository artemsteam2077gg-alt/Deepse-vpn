workflows:
  deepse-vpn-build:
    name: DeepSe VPN APK Build
    max_build_duration: 30
    instance_type: linux
    environment:
      vars:
        PYTHON_VERSION: "3.9.13"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install system dependencies
        script: |
          apt-get update
          apt-get install -y --no-install-recommends \
            openjdk-17-jdk \
            wget \
            unzip \
            git \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            cmake \
            ninja-build \
            build-essential \
            python3-dev
          
      - name: Set up Python
        script: |
          pyenv install $PYTHON_VERSION -s
          pyenv global $PYTHON_VERSION
          
      - name: Install Python packages
        script: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install python-for-android
          
      - name: Check main.py
        script: |
          if [ ! -f "main.py" ]; then
            echo "❌ main.py не найден!"
            exit 1
          else
            echo "✅ main.py найден"
            head -5 main.py
          fi
          
      - name: Setup Android SDK
        script: |
          mkdir -p $HOME/android-sdk
          cd $HOME
          
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          rm -f commandlinetools-linux-11076708_latest.zip
          
          mkdir -p $HOME/android-sdk/cmdline-tools
          mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          
          echo "export ANDROID_HOME=$ANDROID_HOME" >> $CM_ENV
          echo "export PATH=\$PATH:$ANDROID_HOME/cmdline-tools/latest/bin" >> $CM_ENV
          
          yes | sdkmanager --licenses
          
          sdkmanager "platform-tools" \
                     "platforms;android-33" \
                     "build-tools;33.0.0" \
                     "ndk;25.2.9519653"
          
      - name: Create requirements
        script: |
          cat > requirements.txt << EOF
          kivy==2.3.0
          requests==2.31.0
          EOF
          
      - name: Build APK
        script: |
          source $CM_ENV
          
          export ANDROIDNDK=$ANDROID_HOME/ndk/25.2.9519653
          export ANDROIDSDK=$ANDROID_HOME
          
          rm -rf ~/.local/share/python-for-android
          
          if [ ! -d "$ANDROIDNDK" ]; then
            echo "❌ NDK не найден!"
            exit 1
          fi
          
          echo "✅ NDK найден: $ANDROIDNDK"
          
          p4a apk --private . \
            --package=com.deepse.vpn \
            --name "DeepSe VPN" \
            --version 0.1 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy==2.3.0,requests==2.31.0 \
            --permission INTERNET \
            --arch=arm64-v8a \
            --sdk_dir=$ANDROID_HOME \
            --ndk_dir=$ANDROIDNDK \
            --android_api=33 \
            --minsdk=21 \
            --target-sdk=33 \
            --release \
            --ignore-setup-py \
            --verbose
          
      - name: Check APK
        script: |
          if [ -d "bin" ] && [ "$(ls -A bin/*.apk 2>/dev/null)" ]; then
            echo "✅ APK создан успешно!"
            ls -la bin/
          else
            echo "❌ APK не создан!"
            exit 1
          fi
          
    artifacts:
      - bin/*.apk
      - build.log
      
    publishing:
      email:
        recipients:
          - artemsteam2077gg@gmail.com
        notify:
          success: true
          failure: true
