workflows:
  build:
    name: DeepSe VPN
    max_build_duration: 45
    instance_type: linux
    scripts:
      - name: Build
        script: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk
          pip3 install buildozer cython
          buildozer init || true
          buildozer android debug
    artifacts:
      - bin/*.apk
