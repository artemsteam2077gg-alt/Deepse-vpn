workflows:
  build-apk:
    name: Build DeepSe APK
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        PYTHON_VERSION: "3.9.13"
    scripts:
      - name: Install dependencies
        script: |
          brew install automake libtool pkg-config cmake openssl@3
          pip3 install --upgrade pip
          pip3 install cython==0.29.36
          pip3 install python-for-android
          
      - name: Check main.py
        script: |
          if [ ! -f "main.py" ]; then
            exit 1
          fi
          
      - name: Build APK
        script: |
          yes | p4a apk --private . \
            --package=com.deepse.vpn \
            --name "DeepSe VPN" \
            --version 0.1 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy,requests \
            --permission INTERNET \
            --arch=arm64-v8a \
            --release
          
    artifacts:
      - bin/*.apk
