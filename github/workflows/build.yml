name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install python-for-android cython
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk unzip
          
      - name: Set up Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$PWD/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          echo "y" | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0" "ndk;25.2.9519653" > /dev/null
          
      - name: Build APK
        run: |
          export ANDROID_HOME=$PWD/android-sdk
          export ANDROID_NDK=$ANDROID_HOME/ndk/25.2.9519653
          p4a apk --private . \
            --package=com.deepse.vpn \
            --name "DeepSe VPN" \
            --version 0.1 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy,requests \
            --permission INTERNET \
            --arch=arm64-v8a \
            --release \
            --sdk_dir=$ANDROID_HOME \
            --ndk_dir=$ANDROID_NDK \
            --ignore-setup-py \
            --no-download
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: deepse-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
