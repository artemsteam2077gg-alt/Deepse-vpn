name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            unzip \
            wget \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libffi-dev \
            gettext \
            libtool-bin \
            gcc \
            g++
          
      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.36
          pip install python-for-android
          
      - name: Set up Android SDK
        run: |
          # Download SDK tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          
          # Set up SDK structure
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          
          # Set environment variables
          echo "ANDROID_HOME=$PWD/android-sdk" >> $GITHUB_ENV
          echo "$PWD/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          
      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"
          sdkmanager "ndk;25.2.9519653"
          
      - name: Build APK
        run: |
          export ANDROID_NDK=$ANDROID_HOME/ndk/25.2.9519653
          
          # Добавляем libtool в PATH
          export PATH=/usr/bin:$PATH
          export LT_SYSROOT=/usr
          
          p4a apk --private . \
            --package=com.deepse.vpn \
            --name "DeepSe VPN" \
            --version 0.1 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy,requests \
            --permission INTERNET \
            --arch=arm64-v8a \
            --release \
            --sdk_dir=$ANDROID_HOME \
            --ndk_dir=$ANDROID_NDK \
            --ignore-setup-py \
            --no-download
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: deepse-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
