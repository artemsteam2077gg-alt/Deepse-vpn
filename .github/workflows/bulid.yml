name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            wget \
            unzip \
            git \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            cmake
          
      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.36
          pip install python-for-android==2024.10.13
          
      - name: Setup Android SDK
        run: |
          # Создаём структуру SDK
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          
          # Качаем tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          rm commandlinetools-linux-11076708_latest.zip
          
          # Правильная структура
          mkdir -p cmdline-tools
          mv cmdline-tools cmdline-tools/latest
          
          # Переменные окружения
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          
      - name: Install SDK and NDK
        run: |
          # Принимаем лицензии
          yes | sdkmanager --licenses
          
          # Устанавливаем компоненты
          sdkmanager "platform-tools" \
                     "platforms;android-33" \
                     "build-tools;33.0.0" \
                     "ndk;25.2.9519653"
          
      - name: Create main.py (если его нет)
        run: |
          if [ ! -f "main.py" ]; then
            echo "✅ main.py не найден, создаю тестовый..."
            cat > main.py << 'EOF'
from kivy.app import App
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.button import Button
from kivy.uix.label import Label
from kivy.uix.textinput import TextInput
import threading
import requests

class DeepSeApp(App):
    def build(self):
        layout = BoxLayout(orientation='vertical', padding=20, spacing=10)
        
        # Поле ввода подписки
        self.sub_input = TextInput(
            text='https://raw.githubusercontent.com/artemsteam2077gg-alt/myvpn/main/happ_subscription.txt',
            multiline=False,
            size_hint_y=0.2
        )
        layout.add_widget(self.sub_input)
        
        # Кнопка ТУРБО
        turbo_btn = Button(
            text='ТУРБО',
            size_hint_y=0.2,
            background_color=[0.2, 0.6, 1, 1]
        )
        turbo_btn.bind(on_press=self.start_turbo)
        layout.add_widget(turbo_btn)
        
        # Кнопка ОХОТНИК
        hunter_btn = Button(
            text='ОХОТНИК',
            size_hint_y=0.2,
            background_color=[1, 0.4, 0, 1]
        )
        hunter_btn.bind(on_press=self.start_hunter)
        layout.add_widget(hunter_btn)
        
        # Статус
        self.status = Label(text='Готов к работе', size_hint_y=0.2)
        layout.add_widget(self.status)
        
        return layout
    
    def start_turbo(self, instance):
        self.status.text = 'ТУРБО запущен'
        
    def start_hunter(self, instance):
        self.status.text = 'ОХОТНИК запущен на 3 минуты'

if __name__ == '__main__':
    DeepSeApp().run()
EOF
            echo "✅ main.py создан"
          else
            echo "✅ main.py уже существует"
          fi
          
      - name: Create requirements.txt
        run: |
          cat > requirements.txt << 'EOF'
kivy==2.3.0
requests==2.31.0
EOF
          
      - name: Build APK
        run: |
          export ANDROIDNDK=$ANDROID_HOME/ndk/25.2.9519653
          export ANDROIDSDK=$ANDROID_HOME
          
          # Очистка перед сборкой
          rm -rf ~/.local/share/python-for-android
          
          # Сборка APK
          p4a apk --private . \
            --package=com.deepse.vpn \
            --name "DeepSe VPN" \
            --version 0.1 \
            --bootstrap=sdl2 \
            --requirements=$(cat requirements.txt | tr '\n' ',') \
            --permission INTERNET \
            --arch=arm64-v8a \
            --sdk_dir=$ANDROID_HOME \
            --ndk_dir=$ANDROIDNDK \
            --android_api=33 \
            --minsdk=21 \
            --target-sdk=33 \
            --release
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: deepse-vpn-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
