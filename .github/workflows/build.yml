name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            wget \
            unzip \
            git \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            cmake \
            ninja-build \
            ccache \
            gettext \
            automake \
            build-essential \
            python3-dev \
            libncurses5 \
            libncurses5-dev
          
      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install python-for-android==2024.10.13
          
      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          rm commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          
      - name: Install SDK and NDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" \
                     "platforms;android-33" \
                     "build-tools;33.0.0" \
                     "ndk;25.2.9519653"
          echo "✅ NDK installed at: $ANDROID_HOME/ndk/25.2.9519653"
          ls -la $ANDROID_HOME/ndk/25.2.9519653/toolchains || echo "⚠️ NDK check failed"
          
      - name: Check and create main.py if needed
        run: |
          if [ ! -f "main.py" ]; then
            echo "📝 main.py не найден, создаю тестовый..."
            cat > main.py << 'EOF'
from kivy.app import App
from kivy.uix.button import Button
from kivy.uix.label import Label
from kivy.uix.boxlayout import BoxLayout

class TestApp(App):
    def build(self):
        layout = BoxLayout(orientation='vertical')
        btn = Button(text="ТУРБО", size_hint=(1, 0.3))
        label = Label(text="DeepSe VPN Test", size_hint=(1, 0.7))
        layout.add_widget(label)
        layout.add_widget(btn)
        return layout

if __name__ == "__main__":
    TestApp().run()
EOF
            echo "✅ Тестовый main.py создан"
          else
            echo "✅ Использую ваш main.py"
            cat main.py | head -10
          fi
          
      - name: Create requirements.txt
        run: |
          cat > requirements.txt << EOF
          kivy==2.3.0
          requests==2.31.0
          EOF
          echo "✅ requirements.txt created"
          
      - name: Build APK
        run: |
          export ANDROIDNDK=$ANDROID_HOME/ndk/25.2.9519653
          export ANDROIDSDK=$ANDROID_HOME
          export ANDROIDAPI=33
          export NDKAPI=33
          
          if [ ! -d "$ANDROIDNDK" ]; then
            echo "❌ NDK not found at $ANDROIDNDK"
            ls -la $ANDROID_HOME/ndk/
            exit 1
          fi
          
          rm -rf ~/.local/share/python-for-android
          
          echo "🔨 Starting APK build..."
          p4a apk --private . \
            --package=com.deepse.vpn \
            --name "DeepSe VPN" \
            --version 0.1 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy==2.3.0,requests==2.31.0 \
            --permission INTERNET \
            --arch=arm64-v8a \
            --sdk_dir=$ANDROID_HOME \
            --ndk_dir=$ANDROIDNDK \
            --android_api=33 \
            --minsdk=21 \
            --target-sdk=33 \
            --release \
            --ignore-setup-py \
            --no-download \
            --verbose \
            --color=always
          
          if [ -d "bin" ] && [ "$(ls -A bin/*.apk 2>/dev/null)" ]; then
            echo "✅ APK built successfully!"
            ls -la bin/
          else
            echo "❌ APK build failed - no APK found in bin/"
            exit 1
          fi
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: deepse-vpn-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
