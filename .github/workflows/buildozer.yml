name: Build with Buildozer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK with Buildozer
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            libltdl-dev

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install "Cython<3.0"  # ВАЖНО: версия < 3.0 [citation:7]
          pip install buildozer

      - name: Check main.py
        run: |
          if [ ! -f "master/main.py" ]; then
            echo "❌ main.py не найден в корне репозитория!"
            exit 1
          else
            echo "✅ main.py найден"
            head -10 master/main.py
          fi

      - name: Create buildozer.spec
        run: |
          cd master
          cat > buildozer.spec << 'EOF'
[app]
title = DeepSe VPN
package.name = deepse
package.domain = com.deepse.vpn
source.dir = .
source.include_exts = py,png,jpg,kv,atlas,txt
version = 0.1
requirements = python3,kivy==2.3.0,requests==2.31.0
orientation = portrait
osx.python_version = 3
osx.kivy_version = 2.3.0
fullscreen = 0

[buildozer]
log_level = 2
warn_on_root = 1
EOF

      - name: Cache Buildozer global directory
        uses: actions/cache@v3
        with:
          path: .buildozer_global
          key: buildozer-global-${{ hashFiles('master/buildozer.spec') }}

      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          repository_root: master
          workdir: .
          buildozer_version: stable
        env:
          APP_ANDROID_ARCH: arm64-v8a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: deepse-vpn-apk
          path: ${{ steps.buildozer.outputs.filename }}
          if-no-files-found: error
          retention-days: 30
